model:
  name_or_path: google/gemma-3-270m
  local_fallback_path: models/gemma-3-270m
  trust_remote_code: true
  torch_dtype: bfloat16
  device_map:
  attn_implementation: eager

paths:
  train_jsonl: logo-detailed-prompt/train.jsonl
  valid_jsonl: logo-detailed-prompt/valid.jsonl
  output_dir: outputs/smoke_checkpoints
  adapter_dir: outputs/smoke_adapter
  outputs_dir: outputs/smoke_generations
  results_json: outputs/smoke_results.json

data:
  max_length: 2048

lora:
  rank: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  seed: 42
  max_steps: 1
  num_train_epochs: 1
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 1
  learning_rate: 0.0002
  warmup_ratio: 0.0
  lr_scheduler_type: constant
  logging_steps: 1
  save_total_limit: 1
  save_strategy: "no"
  eval_strategy: "no"
  load_best_model_at_end: false
  fp16: false
  bf16: true
  gradient_checkpointing: true
  optim: adamw_torch
  max_grad_norm: 1.0

generation:
  prompt_max_length: 1024
  max_new_tokens: 1200
  do_sample: false
  temperature: 0.0
  top_p: 1.0
  num_beams: 1
  repetition_penalty: 1.05
